{{ define "main" }}
<div class="bg-[#F5F1ED] min-h-screen flex items-center">
  <div class="max-w-lg mx-auto px-6 py-32 text-center">
    <div class="w-20 h-20 mx-auto rounded-full bg-[#C67B5C]/10 flex items-center justify-center text-[#C67B5C] mb-8">
      <i data-lucide="archive" class="w-10 h-10"></i>
    </div>
    <h1 class="font-lora text-4xl md:text-5xl font-medium text-[#3A3230] mb-4">
      Esta página se ha perdido en el baúl.
    </h1>
    <p class="font-sans text-lg text-[#8B7E79] leading-relaxed mb-10">
      Puede que el enlace esté roto o que la página ya no exista.
      Volvamos a un sitio conocido.
    </p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-[#C67B5C] text-white rounded-xl font-sans font-medium hover:opacity-90 transition-opacity">
        <i data-lucide="home" class="w-4 h-4"></i>
        Ir al inicio
      </a>
      <a href="/ayuda/" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-white border border-[rgba(58,50,48,0.12)] text-[#3A3230] rounded-xl font-sans font-medium hover:bg-[#E8DED7]/40 transition-colors">
        <i data-lucide="life-buoy" class="w-4 h-4"></i>
        Centro de ayuda
      </a>
    </div>
  </div>
</div>
{{ end }}
